<div class="login-container">

  <h1>Football Players</h1>

  <h2>Iniciar Sesión</h2>

  <form (ngSubmit)="login()">

    <input
      type="text"
      placeholder="Usuario"
      [(ngModel)]="username"
      name="username"
    />

    <input
      type="password"
      placeholder="Contraseña"
      [(ngModel)]="password"
      name="password"
    />

    <button type="submit">
      Ingresar
    </button>

  </form>

  <p class="error" *ngIf="errorMessage">
    {{ errorMessage }}
  </p>

</div>
