<div class="register-container">

  <h1>Crear Cuenta</h1>
  <p class="subtitle">
  Crea tu cuenta para acceder al sistema.
</p>

  <form (ngSubmit)="register()">

    <input
      [(ngModel)]="username"
      name="username"
      placeholder="Usuario"
      required
    />

    <input
      [(ngModel)]="password"
      name="password"
      type="password"
      placeholder="Contraseña"
      required
    />

    <button type="submit">
      Registrarse
    </button>

  </form>

</div>
